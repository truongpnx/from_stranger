services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
  
  redis:
    image: redis:latest
    volumes:
      - redis_data:/data

networks:
  default:
    name: bridge
    driver: bridge

volumes:
  redis_data:
    driver: local