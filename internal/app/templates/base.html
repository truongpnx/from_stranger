{{define "base"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <link rel="icon" type="image/x-icon" href="/static/images/flaticon/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/images/flaticon/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/images/flaticon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/static/images/flaticon/favicon-48x48.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/images/flaticon/apple-touch-icon.png">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="app-header">
    <h1>From Stranger</h1>
  </header>

  <div class="app-container">
    {{template "content" .}}
  </div>

  <nav class="mobile-nav">
    <button class="nav-btn active" data-tab="world">
      <span class="nav-icon">🌍</span>
      <span class="nav-label">World</span>
    </button>
    <button class="nav-btn" data-tab="publish">
      <span class="nav-icon">✏️</span>
      <span class="nav-label">Publish</span>
    </button>
  </nav>

  <script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
