{{define "published_list"}}
{{if .Sentences}}
  {{range .Sentences}}
  <div class="published-item">
    <p class="published-text">{{.Text}}</p>
    <div class="reaction-counts">
      <span class="count-heart">❤️ {{.Heart}}</span>
      <span class="count-hate">💔 {{.Hate}}</span>
      <span class="count-ignore">🙈 {{.Ignore}}</span>
    </div>
  </div>
  {{end}}
{{else}}
  <p class="empty-state">No published sentences yet.</p>
{{end}}
{{end}}
