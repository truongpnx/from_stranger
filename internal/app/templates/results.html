{{define "results"}}
<section class="results-card">
  <h2>Results</h2>
  <p class="results-text">{{.Sentence.Text}}</p>
  <div class="result-counts">
    <span class="result-count">❤️ <strong>{{.Sentence.Heart}}</strong></span>
    <span class="result-count">💔 <strong>{{.Sentence.Hate}}</strong></span>
    <span class="result-count">🙈 <strong>{{.Sentence.Ignore}}</strong></span>
  </div>
</section>
{{end}}
